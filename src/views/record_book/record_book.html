<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>LIBRO DE REGISTROS</title>
  <link rel="stylesheet" href="record_book.css" />
  <script defer src="record_book.js"></script>
  <style>
    .filtro-container {
      display: block;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <h1>Libro de registros</h1>
  <button id="toggleFiltersBtn">Mostrar/Ocultar Filtros</button>
  <div class="filtro-container">
    <h2>Filtros</h2>
    <form id="filtro-form">
      <!-- Tu formulario de filtros aquí -->
      <div class="range_selector">
        <h5>Numero de facutra:</h5>
        <label class="range_label">mínimo:</label>
        <input type="number" id="numero1" name="numero1">
        <label class="range_label">máximo:</label>
        <input type="number" id="numero2" name="numero2">
      </div>

      <div class="list_selector">
        <h5>Letra factura:</h5>
        <div class="active_selection" id="active_selection_letra">
        </div>
        <div class="inactive_selection" id="inactive_selection_letra">
        </div>
      </div>

      <div class="list_selector">
        <h5>Clientes:</h5>
        <div class="active_selection" id="active_selection_cliente">
        </div>
        <div class="inactive_selection" id="inactive_selection_cliente">
        </div>
      </div>

      <div class="range_selector">
        <h5>Fecha:</h5>
        <label class="range_label">mínimo:</label>
        <input type="date" id="fecha1" name="fecha1">
        <label class="range_label">máximo:</label>
        <input type="date" id="fecha2" name="fecha2">
      </div>

      <div class="list_selector">
        <h5>Concepto:</h5>
        <div class="active_selection" id="active_selection_concepto">
        </div>
        <div class="inactive_selection" id="inactive_selection_concepto">
        </div>
      </div>

      <div class="range-selector">
        <h5>Base imponible</h5>
        <label class="range_label">mínimo:</label>
        <input type="number" id="baseImponible1" name="baseImponible1">
        <label class="range_label">máximo:</label>
        <input type="number" id="baseImponible2" name="baseImponible2">
      </div>

      <div class="list_selector">
        <h5>IVA:</h5>
        <div class="active_selection" id="active_selection_iva">
        </div>
        <div class="inactive_selection" id="inactive_selection_iva">
        </div>
      </div>

      <div class="list_selector">
        <h5>IRPF:</h5>
        <div class="active_selection" id="active_selection_irpf">
        </div>
        <div class="inactive_selection" id="inactive_selection_irpf">
        </div>
      </div>

      <button type="submit">Aplicar Filtros</button>
    </form>
  </div>
  <select id="formatos_selector"></select>

  <div class="table-container">
    <div class="scrollable-table">
      <table id="tabla_facturas" border="2">
        <!-- Añade aquí el resto de filas -->
      </table>
    </div>
  </div>

  <button id="atras_btn">Atrás</button>
  <button id="guardar_btn">Guardar</button>

</body>

</html>
